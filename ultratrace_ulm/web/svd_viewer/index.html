<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SVD B-mode Track Viewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="viewer">
      <section class="stage">
        <canvas id="movie" width="960" height="540"></canvas>
        <canvas id="overlay" width="960" height="540"></canvas>
        <div id="slabGrid" class="slab-grid" hidden></div>
      </section>
      <aside class="panel">
        <div class="title">SVD B-mode</div>
        <div id="status" class="status">Loading...</div>
        <div class="row">
          <button id="play" type="button" title="Play/Pause">Play</button>
          <button id="prev" type="button" title="Previous frame">-</button>
          <button id="next" type="button" title="Next frame">+</button>
        </div>
        <label>
          Frame
          <input id="frame" type="range" min="0" max="0" value="0" />
        </label>
        <div class="readout"><span id="frameText">0 / 0</span></div>
        <label>
          FPS
          <input id="fps" type="number" min="1" max="120" value="30" />
        </label>
        <label>
          Track tail
          <input id="tail" type="range" min="0" max="80" value="18" />
        </label>
        <label class="check">
          <input id="tracksVisible" type="checkbox" checked />
          Tracks
        </label>
        <label class="check">
          <input id="pointsVisible" type="checkbox" checked />
          Current bubbles
        </label>
      </aside>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
