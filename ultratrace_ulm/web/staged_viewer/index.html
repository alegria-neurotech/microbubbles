<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ULM Staged Movie</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="stage">
        <div class="screen">
          <canvas id="movie"></canvas>
          <canvas id="overlay"></canvas>
        </div>
      </section>
      <aside class="panel">
        <div class="topline">
          <div id="mode">raw video</div>
          <div id="frameText">0 / 0</div>
        </div>
        <div id="status">Loading...</div>
        <div class="actions">
          <button id="filter" type="button">filter for moving objects</button>
          <button id="detect" type="button" disabled>detect</button>
          <button id="track" type="button" disabled>track</button>
        </div>
        <div class="transport">
          <button id="play" type="button">Play</button>
          <button id="prev" type="button" title="Previous frame">Prev</button>
          <button id="next" type="button" title="Next frame">Next</button>
        </div>
        <label>
          <span>Frame</span>
          <input id="frame" type="range" min="0" max="0" value="0" />
        </label>
        <label class="fps">
          <span>FPS</span>
          <input id="fps" type="number" min="1" max="120" value="30" />
        </label>
      </aside>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
